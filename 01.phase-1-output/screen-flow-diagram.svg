<svg width="1200" height="800" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .screen-box { fill: #e6f3ff; stroke: #0066cc; stroke-width: 2; }
      .menu-box { fill: #fff2e6; stroke: #cc6600; stroke-width: 2; }
      .admin-box { fill: #ffe6e6; stroke: #cc0000; stroke-width: 2; }
      .flow-arrow { stroke: #333; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
      .text-label { font-family: Arial, sans-serif; font-size: 12px; text-anchor: middle; }
      .title-text { font-family: Arial, sans-serif; font-size: 16px; font-weight: bold; text-anchor: middle; }
      .option-text { font-family: Arial, sans-serif; font-size: 10px; text-anchor: middle; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#333" />
    </marker>
  </defs>
  
  <!-- Title -->
  <text x="600" y="30" class="title-text" fill="#000">CardDemo COBOL Application Screen Flow</text>
  
  <!-- Sign-on Screen (Entry Point) -->
  <rect x="500" y="60" width="200" height="60" class="screen-box" />
  <text x="600" y="85" class="text-label" fill="#000">COSGN00C</text>
  <text x="600" y="100" class="text-label" fill="#000">Sign-on Screen</text>
  <text x="600" y="115" class="option-text" fill="#666">Map: COSGN0A</text>
  
  <!-- Authentication Decision -->
  <polygon points="580,150 620,150 640,180 620,210 580,210 560,180" fill="#ffffe6" stroke="#999" stroke-width="2"/>
  <text x="600" y="185" class="option-text" fill="#000">User Type?</text>
  
  <!-- Admin Menu Branch -->
  <rect x="200" y="250" width="200" height="60" class="admin-box" />
  <text x="300" y="275" class="text-label" fill="#000">COADM01C</text>
  <text x="300" y="290" class="text-label" fill="#000">Admin Menu</text>
  <text x="300" y="305" class="option-text" fill="#666">Map: COADM1A</text>
  
  <!-- Main Menu Branch -->
  <rect x="800" y="250" width="200" height="60" class="menu-box" />
  <text x="900" y="275" class="text-label" fill="#000">COMEN01C</text>
  <text x="900" y="290" class="text-label" fill="#000">Main Menu</text>
  <text x="900" y="305" class="option-text" fill="#666">Map: COMEN1A</text>
  
  <!-- Admin Menu Options -->
  <rect x="50" y="350" width="150" height="40" class="screen-box" />
  <text x="125" y="365" class="option-text" fill="#000">1. COUSR00C</text>
  <text x="125" y="380" class="option-text" fill="#000">User List</text>
  
  <rect x="220" y="350" width="150" height="40" class="screen-box" />
  <text x="295" y="365" class="option-text" fill="#000">2. COUSR01C</text>
  <text x="295" y="380" class="option-text" fill="#000">User Add</text>
  
  <rect x="390" y="350" width="150" height="40" class="screen-box" />
  <text x="465" y="365" class="option-text" fill="#000">3. COUSR02C</text>
  <text x="465" y="380" class="option-text" fill="#000">User Update</text>
  
  <rect x="220" y="410" width="150" height="40" class="screen-box" />
  <text x="295" y="425" class="option-text" fill="#000">4. COUSR03C</text>
  <text x="295" y="440" class="option-text" fill="#000">User Delete</text>
  
  <!-- Main Menu Options (Left Column) -->
  <rect x="650" y="350" width="150" height="40" class="screen-box" />
  <text x="725" y="365" class="option-text" fill="#000">1. COACTVWC</text>
  <text x="725" y="380" class="option-text" fill="#000">Account View</text>
  
  <rect x="650" y="400" width="150" height="40" class="screen-box" />
  <text x="725" y="415" class="option-text" fill="#000">2. COACTUPC</text>
  <text x="725" y="430" class="option-text" fill="#000">Account Update</text>
  
  <rect x="650" y="450" width="150" height="40" class="screen-box" />
  <text x="725" y="465" class="option-text" fill="#000">3. COCRDLIC</text>
  <text x="725" y="480" class="option-text" fill="#000">Credit Card List</text>
  
  <rect x="650" y="500" width="150" height="40" class="screen-box" />
  <text x="725" y="515" class="option-text" fill="#000">4. COCRDSLC</text>
  <text x="725" y="530" class="option-text" fill="#000">Credit Card View</text>
  
  <rect x="650" y="550" width="150" height="40" class="screen-box" />
  <text x="725" y="565" class="option-text" fill="#000">5. COCRDUPC</text>
  <text x="725" y="580" class="option-text" fill="#000">Credit Card Update</text>
  
  <!-- Main Menu Options (Right Column) -->
  <rect x="820" y="350" width="150" height="40" class="screen-box" />
  <text x="895" y="365" class="option-text" fill="#000">6. COTRN00C</text>
  <text x="895" y="380" class="option-text" fill="#000">Transaction List</text>
  
  <rect x="820" y="400" width="150" height="40" class="screen-box" />
  <text x="895" y="415" class="option-text" fill="#000">7. COTRN01C</text>
  <text x="895" y="430" class="option-text" fill="#000">Transaction View</text>
  
  <rect x="820" y="450" width="150" height="40" class="screen-box" />
  <text x="895" y="465" class="option-text" fill="#000">8. COTRN02C</text>
  <text x="895" y="480" class="option-text" fill="#000">Transaction Add</text>
  
  <rect x="820" y="500" width="150" height="40" class="screen-box" />
  <text x="895" y="515" class="option-text" fill="#000">9. CORPT00C</text>
  <text x="895" y="530" class="option-text" fill="#000">Transaction Reports</text>
  
  <rect x="820" y="550" width="150" height="40" class="screen-box" />
  <text x="895" y="565" class="option-text" fill="#000">10. COBIL00C</text>
  <text x="895" y="580" class="option-text" fill="#000">Bill Payment</text>
  
  <!-- Transaction Flow Chain -->
  <rect x="990" y="350" width="150" height="40" class="menu-box" />
  <text x="1065" y="365" class="option-text" fill="#000">Transaction Flow</text>
  <text x="1065" y="380" class="option-text" fill="#000">List → View → Add</text>
  
  <!-- User Management Flow -->
  <rect x="50" y="480" width="150" height="40" class="admin-box" />
  <text x="125" y="495" class="option-text" fill="#000">User Management</text>
  <text x="125" y="510" class="option-text" fill="#000">U=Update, D=Delete</text>
  
  <!-- Flow Arrows -->
  <!-- Sign-on to decision -->
  <line x1="600" y1="120" x2="600" y2="150" class="flow-arrow" />
  
  <!-- Decision to Admin Menu -->
  <line x1="580" y1="180" x2="400" y2="180" class="flow-arrow" />
  <line x1="400" y1="180" x2="400" y2="250" class="flow-arrow" />
  <line x1="400" y1="250" x2="300" y2="250" class="flow-arrow" />
  <text x="490" y="175" class="option-text" fill="#000">Admin</text>
  
  <!-- Decision to Main Menu -->
  <line x1="620" y1="180" x2="800" y2="180" class="flow-arrow" />
  <line x1="800" y1="180" x2="800" y2="250" class="flow-arrow" />
  <line x1="800" y1="250" x2="900" y2="250" class="flow-arrow" />
  <text x="710" y="175" class="option-text" fill="#000">Regular User</text>
  
  <!-- Admin Menu to Options -->
  <line x1="300" y1="310" x2="300" y2="330" class="flow-arrow" />
  <line x1="200" y1="330" x2="400" y2="330" class="flow-arrow" />
  <line x1="125" y1="330" x2="125" y2="350" class="flow-arrow" />
  <line x1="295" y1="330" x2="295" y2="350" class="flow-arrow" />
  <line x1="465" y1="330" x2="465" y2="350" class="flow-arrow" />
  <line x1="295" y1="390" x2="295" y2="410" class="flow-arrow" />
  
  <!-- Main Menu to Options -->
  <line x1="900" y1="310" x2="900" y2="330" class="flow-arrow" />
  <line x1="650" y1="330" x2="1150" y2="330" class="flow-arrow" />
  <line x1="725" y1="330" x2="725" y2="350" class="flow-arrow" />
  <line x1="725" y1="390" x2="725" y2="400" class="flow-arrow" />
  <line x1="725" y1="440" x2="725" y2="450" class="flow-arrow" />
  <line x1="725" y1="490" x2="725" y2="500" class="flow-arrow" />
  <line x1="725" y1="540" x2="725" y2="550" class="flow-arrow" />
  <line x1="895" y1="330" x2="895" y2="350" class="flow-arrow" />
  <line x1="895" y1="390" x2="895" y2="400" class="flow-arrow" />
  <line x1="895" y1="440" x2="895" y2="450" class="flow-arrow" />
  <line x1="895" y1="490" x2="895" y2="500" class="flow-arrow" />
  <line x1="895" y1="540" x2="895" y2="550" class="flow-arrow" />
  
  <!-- Transaction Chain Flow -->
  <line x1="970" y1="370" x2="990" y2="370" class="flow-arrow" />
  <text x="980" y="365" class="option-text" fill="#000">S</text>
  
  <!-- User Management Flow -->
  <line x1="125" y1="390" x2="125" y2="480" class="flow-arrow" />
  
  <!-- PF Key Legend -->
  <rect x="50" y="650" width="300" height="120" fill="#f0f0f0" stroke="#999" stroke-width="1" />
  <text x="200" y="670" class="text-label" fill="#000">Standard PF Key Navigation</text>
  <text x="60" y="690" class="option-text" fill="#000">PF3 = Exit/Return to Previous Screen</text>
  <text x="60" y="705" class="option-text" fill="#000">PF4 = Clear Current Screen</text>
  <text x="60" y="720" class="option-text" fill="#000">PF5 = Special Functions (Copy, List)</text>
  <text x="60" y="735" class="option-text" fill="#000">PF7 = Page Backward</text>
  <text x="60" y="750" class="option-text" fill="#000">PF8 = Page Forward</text>
  <text x="60" y="765" class="option-text" fill="#000">ENTER = Process/Continue</text>
  
  <!-- Screen Selection Legend -->
  <rect x="400" y="650" width="300" height="120" fill="#f0f0f0" stroke="#999" stroke-width="1" />
  <text x="550" y="670" class="text-label" fill="#000">Screen Selection Patterns</text>
  <text x="410" y="690" class="option-text" fill="#000">S = Select for View (Transaction List)</text>
  <text x="410" y="705" class="option-text" fill="#000">U = Update (User Management)</text>
  <text x="410" y="720" class="option-text" fill="#000">D = Delete (User Management)</text>
  <text x="410" y="735" class="option-text" fill="#000">Y/N = Confirm Actions (Add/Delete)</text>
  <text x="410" y="750" class="option-text" fill="#000">1-10 = Menu Option Numbers</text>
  <text x="410" y="765" class="option-text" fill="#000">Numeric = Search/Filter Criteria</text>
</svg>
