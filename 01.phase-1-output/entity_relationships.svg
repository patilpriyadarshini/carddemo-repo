<?xml version="1.0" encoding="UTF-8"?>
<svg width="1200" height="800" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .entity-box { fill: #e6f3ff; stroke: #0066cc; stroke-width: 2; }
      .entity-title { font-family: Arial, sans-serif; font-size: 14px; font-weight: bold; text-anchor: middle; }
      .entity-attr { font-family: Arial, sans-serif; font-size: 10px; text-anchor: start; }
      .relationship-line { stroke: #333; stroke-width: 2; }
      .cardinality { font-family: Arial, sans-serif; font-size: 10px; font-weight: bold; text-anchor: middle; }
    </style>
  </defs>
  
  <!-- Customer Entity -->
  <rect x="50" y="50" width="180" height="120" class="entity-box"/>
  <text x="140" y="70" class="entity-title">Customer</text>
  <text x="60" y="85" class="entity-attr">CUST-ID (PK)</text>
  <text x="60" y="100" class="entity-attr">CUST-FIRST-NAME</text>
  <text x="60" y="115" class="entity-attr">CUST-LAST-NAME</text>
  <text x="60" y="130" class="entity-attr">CUST-SSN</text>
  <text x="60" y="145" class="entity-attr">CUST-FICO-CREDIT-SCORE</text>
  <text x="60" y="160" class="entity-attr">...</text>
  
  <!-- Account Entity -->
  <rect x="300" y="50" width="180" height="120" class="entity-box"/>
  <text x="390" y="70" class="entity-title">Account</text>
  <text x="310" y="85" class="entity-attr">ACCT-ID (PK)</text>
  <text x="310" y="100" class="entity-attr">ACCT-CURR-BAL</text>
  <text x="310" y="115" class="entity-attr">ACCT-CREDIT-LIMIT</text>
  <text x="310" y="130" class="entity-attr">ACCT-ACTIVE-STATUS</text>
  <text x="310" y="145" class="entity-attr">ACCT-GROUP-ID</text>
  <text x="310" y="160" class="entity-attr">...</text>
  
  <!-- Card Entity -->
  <rect x="550" y="50" width="180" height="120" class="entity-box"/>
  <text x="640" y="70" class="entity-title">Card</text>
  <text x="560" y="85" class="entity-attr">CARD-NUM (PK)</text>
  <text x="560" y="100" class="entity-attr">CARD-ACCT-ID (FK)</text>
  <text x="560" y="115" class="entity-attr">CARD-CVV-CD</text>
  <text x="560" y="130" class="entity-attr">CARD-EMBOSSED-NAME</text>
  <text x="560" y="145" class="entity-attr">CARD-ACTIVE-STATUS</text>
  <text x="560" y="160" class="entity-attr">...</text>
  
  <!-- Card Cross-Reference Entity -->
  <rect x="300" y="220" width="180" height="100" class="entity-box"/>
  <text x="390" y="240" class="entity-title">Card Cross-Reference</text>
  <text x="310" y="255" class="entity-attr">XREF-CARD-NUM (FK)</text>
  <text x="310" y="270" class="entity-attr">XREF-CUST-ID (FK)</text>
  <text x="310" y="285" class="entity-attr">XREF-ACCT-ID (FK)</text>
  <text x="310" y="300" class="entity-attr">...</text>
  
  <!-- Transaction Entity -->
  <rect x="800" y="50" width="180" height="140" class="entity-box"/>
  <text x="890" y="70" class="entity-title">Transaction</text>
  <text x="810" y="85" class="entity-attr">TRAN-ID (PK)</text>
  <text x="810" y="100" class="entity-attr">TRAN-CARD-NUM (FK)</text>
  <text x="810" y="115" class="entity-attr">TRAN-TYPE-CD (FK)</text>
  <text x="810" y="130" class="entity-attr">TRAN-CAT-CD (FK)</text>
  <text x="810" y="145" class="entity-attr">TRAN-AMT</text>
  <text x="810" y="160" class="entity-attr">TRAN-MERCHANT-NAME</text>
  <text x="810" y="175" class="entity-attr">...</text>
  
  <!-- Daily Transaction Entity -->
  <rect x="800" y="220" width="180" height="140" class="entity-box"/>
  <text x="890" y="240" class="entity-title">Daily Transaction</text>
  <text x="810" y="255" class="entity-attr">DALYTRAN-ID (PK)</text>
  <text x="810" y="270" class="entity-attr">DALYTRAN-CARD-NUM (FK)</text>
  <text x="810" y="285" class="entity-attr">DALYTRAN-TYPE-CD (FK)</text>
  <text x="810" y="300" class="entity-attr">DALYTRAN-CAT-CD (FK)</text>
  <text x="810" y="315" class="entity-attr">DALYTRAN-AMT</text>
  <text x="810" y="330" class="entity-attr">...</text>
  
  <!-- Transaction Type Entity -->
  <rect x="550" y="400" width="180" height="80" class="entity-box"/>
  <text x="640" y="420" class="entity-title">Transaction Type</text>
  <text x="560" y="435" class="entity-attr">TRAN-TYPE (PK)</text>
  <text x="560" y="450" class="entity-attr">TRAN-TYPE-DESC</text>
  <text x="560" y="465" class="entity-attr">...</text>
  
  <!-- Transaction Category Entity -->
  <rect x="800" y="400" width="180" height="80" class="entity-box"/>
  <text x="890" y="420" class="entity-title">Transaction Category</text>
  <text x="810" y="435" class="entity-attr">TRAN-TYPE-CD (FK)</text>
  <text x="810" y="450" class="entity-attr">TRAN-CAT-CD (PK)</text>
  <text x="810" y="465" class="entity-attr">TRAN-CAT-TYPE-DESC</text>
  
  <!-- Transaction Category Balance Entity -->
  <rect x="50" y="400" width="180" height="100" class="entity-box"/>
  <text x="140" y="420" class="entity-title">Transaction Cat Balance</text>
  <text x="60" y="435" class="entity-attr">TRANCAT-ACCT-ID (FK)</text>
  <text x="60" y="450" class="entity-attr">TRANCAT-TYPE-CD (FK)</text>
  <text x="60" y="465" class="entity-attr">TRANCAT-CD (FK)</text>
  <text x="60" y="480" class="entity-attr">TRAN-CAT-BAL</text>
  
  <!-- Disclosure Group Entity -->
  <rect x="300" y="400" width="180" height="100" class="entity-box"/>
  <text x="390" y="420" class="entity-title">Disclosure Group</text>
  <text x="310" y="435" class="entity-attr">DIS-ACCT-GROUP-ID (FK)</text>
  <text x="310" y="450" class="entity-attr">DIS-TRAN-TYPE-CD (FK)</text>
  <text x="310" y="465" class="entity-attr">DIS-TRAN-CAT-CD (FK)</text>
  <text x="310" y="480" class="entity-attr">DIS-INT-RATE</text>
  
  <!-- Relationships -->
  
  <!-- Customer to Card Cross-Reference (1:N) -->
  <line x1="230" y1="110" x2="300" y2="270" class="relationship-line"/>
  <text x="265" y="190" class="cardinality">1:N</text>
  
  <!-- Account to Card Cross-Reference (1:N) -->
  <line x1="390" y1="170" x2="390" y2="220" class="relationship-line"/>
  <text x="395" y="195" class="cardinality">1:N</text>
  
  <!-- Card to Card Cross-Reference (1:1) -->
  <line x1="550" y1="110" x2="480" y2="270" class="relationship-line"/>
  <text x="515" y="190" class="cardinality">1:1</text>
  
  <!-- Account to Card (1:N) -->
  <line x1="480" y1="110" x2="550" y2="110" class="relationship-line"/>
  <text x="515" y="105" class="cardinality">1:N</text>
  
  <!-- Card to Transaction (1:N) -->
  <line x1="730" y1="110" x2="800" y2="110" class="relationship-line"/>
  <text x="765" y="105" class="cardinality">1:N</text>
  
  <!-- Card to Daily Transaction (1:N) -->
  <line x1="730" y1="150" x2="800" y2="290" class="relationship-line"/>
  <text x="765" y="220" class="cardinality">1:N</text>
  
  <!-- Account to Transaction Category Balance (1:N) -->
  <line x1="300" y1="150" x2="230" y2="450" class="relationship-line"/>
  <text x="265" y="300" class="cardinality">1:N</text>
  
  <!-- Account Group to Disclosure Group (1:N) -->
  <line x1="390" y1="170" x2="390" y2="400" class="relationship-line"/>
  <text x="395" y="285" class="cardinality">1:N</text>
  
  <!-- Transaction Type to Transaction Category (1:N) -->
  <line x1="730" y1="440" x2="800" y2="440" class="relationship-line"/>
  <text x="765" y="435" class="cardinality">1:N</text>
  
  <!-- Transaction Type to Transaction (1:N) -->
  <line x1="640" y1="400" x2="890" y2="190" class="relationship-line"/>
  <text x="765" y="295" class="cardinality">1:N</text>
  
  <!-- Transaction Category to Transaction (1:N) -->
  <line x1="890" y1="400" x2="890" y2="190" class="relationship-line"/>
  <text x="895" y="295" class="cardinality">1:N</text>
  
  <!-- Legend -->
  <rect x="1020" y="50" width="150" height="100" fill="#f0f0f0" stroke="#666" stroke-width="1"/>
  <text x="1095" y="70" class="entity-title">Legend</text>
  <text x="1030" y="90" class="entity-attr">PK = Primary Key</text>
  <text x="1030" y="105" class="entity-attr">FK = Foreign Key</text>
  <text x="1030" y="120" class="entity-attr">1:1 = One to One</text>
  <text x="1030" y="135" class="entity-attr">1:N = One to Many</text>
  
</svg>
