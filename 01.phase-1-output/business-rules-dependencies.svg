<?xml version="1.0" encoding="UTF-8"?>
<svg width="1000" height="800" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" 
     refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#666" />
    </marker>
  </defs>
  
  <!-- Title -->
  <text x="500" y="30" text-anchor="middle" font-size="20" font-weight="bold" fill="#333">
    CardDemo Business Calculation Rules Dependencies
  </text>
  
  <!-- Bill Payment Rules Group -->
  <rect x="50" y="60" width="280" height="180" rx="10" fill="#e3f2fd" stroke="#1976d2" stroke-width="2" stroke-dasharray="5,5"/>
  <text x="190" y="85" text-anchor="middle" font-size="14" font-weight="bold" fill="#1565c0">Bill Payment Processing</text>
  
  <!-- Bill Payment Balance Rule -->
  <rect x="70" y="100" width="180" height="60" rx="8" fill="#e8f4fd" stroke="#2196f3" stroke-width="2"/>
  <text x="160" y="120" text-anchor="middle" font-size="11" font-weight="bold" fill="#1976d2">RULE-CALC-001</text>
  <text x="160" y="135" text-anchor="middle" font-size="9" fill="#333">Bill Payment</text>
  <text x="160" y="148" text-anchor="middle" font-size="9" fill="#333">Balance Calculation</text>
  
  <!-- Transaction ID Generation Rule -->
  <rect x="70" y="170" width="180" height="60" rx="8" fill="#e8f4fd" stroke="#2196f3" stroke-width="2"/>
  <text x="160" y="190" text-anchor="middle" font-size="11" font-weight="bold" fill="#1976d2">RULE-CALC-008</text>
  <text x="160" y="205" text-anchor="middle" font-size="9" fill="#333">Transaction ID</text>
  <text x="160" y="218" text-anchor="middle" font-size="9" fill="#333">Generation</text>
  
  <!-- Dependency arrow from RULE-CALC-001 to RULE-CALC-008 -->
  <line x1="160" y1="160" x2="160" y2="170" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Account Update Rules Group -->
  <rect x="380" y="60" width="560" height="280" rx="10" fill="#f3e5f5" stroke="#9c27b0" stroke-width="2" stroke-dasharray="5,5"/>
  <text x="660" y="85" text-anchor="middle" font-size="14" font-weight="bold" fill="#7b1fa2">Account Update Rules Group</text>
  
  <!-- Credit Limit Rule -->
  <rect x="400" y="100" width="160" height="60" rx="8" fill="#fff3e0" stroke="#ff9800" stroke-width="2"/>
  <text x="480" y="120" text-anchor="middle" font-size="10" font-weight="bold" fill="#f57c00">RULE-CALC-002</text>
  <text x="480" y="135" text-anchor="middle" font-size="9" fill="#333">Credit Limit</text>
  <text x="480" y="148" text-anchor="middle" font-size="9" fill="#333">Conversion</text>
  
  <!-- Cash Limit Rule -->
  <rect x="580" y="100" width="160" height="60" rx="8" fill="#fff3e0" stroke="#ff9800" stroke-width="2"/>
  <text x="660" y="120" text-anchor="middle" font-size="10" font-weight="bold" fill="#f57c00">RULE-CALC-003</text>
  <text x="660" y="135" text-anchor="middle" font-size="9" fill="#333">Cash Limit</text>
  <text x="660" y="148" text-anchor="middle" font-size="9" fill="#333">Conversion</text>
  
  <!-- Current Balance Rule -->
  <rect x="760" y="100" width="160" height="60" rx="8" fill="#fff3e0" stroke="#ff9800" stroke-width="2"/>
  <text x="840" y="120" text-anchor="middle" font-size="10" font-weight="bold" fill="#f57c00">RULE-CALC-004</text>
  <text x="840" y="135" text-anchor="middle" font-size="9" fill="#333">Current Balance</text>
  <text x="840" y="148" text-anchor="middle" font-size="9" fill="#333">Conversion</text>
  
  <!-- Cycle Credit Rule -->
  <rect x="400" y="180" width="160" height="60" rx="8" fill="#fff3e0" stroke="#ff9800" stroke-width="2"/>
  <text x="480" y="200" text-anchor="middle" font-size="10" font-weight="bold" fill="#f57c00">RULE-CALC-005</text>
  <text x="480" y="215" text-anchor="middle" font-size="9" fill="#333">Cycle Credit</text>
  <text x="480" y="228" text-anchor="middle" font-size="9" fill="#333">Conversion</text>
  
  <!-- Cycle Debit Rule -->
  <rect x="580" y="180" width="160" height="60" rx="8" fill="#fff3e0" stroke="#ff9800" stroke-width="2"/>
  <text x="660" y="200" text-anchor="middle" font-size="10" font-weight="bold" fill="#f57c00">RULE-CALC-006</text>
  <text x="660" y="215" text-anchor="middle" font-size="9" fill="#333">Cycle Debit</text>
  <text x="660" y="228" text-anchor="middle" font-size="9" fill="#333">Conversion</text>
  
  <!-- Report Generation Rules Group -->
  <rect x="50" y="380" width="400" height="180" rx="10" fill="#e8f5e8" stroke="#4caf50" stroke-width="2" stroke-dasharray="5,5"/>
  <text x="250" y="405" text-anchor="middle" font-size="14" font-weight="bold" fill="#388e3c">Report Generation</text>
  
  <!-- Report Date Range Rule -->
  <rect x="70" y="420" width="160" height="60" rx="8" fill="#e8f5e8" stroke="#4caf50" stroke-width="2"/>
  <text x="150" y="440" text-anchor="middle" font-size="10" font-weight="bold" fill="#388e3c">RULE-CALC-007</text>
  <text x="150" y="455" text-anchor="middle" font-size="9" fill="#333">Report Date Range</text>
  <text x="150" y="468" text-anchor="middle" font-size="9" fill="#333">Calculation</text>
  
  <!-- Date Input Conversion Rule -->
  <rect x="250" y="420" width="160" height="60" rx="8" fill="#e8f5e8" stroke="#4caf50" stroke-width="2"/>
  <text x="330" y="440" text-anchor="middle" font-size="10" font-weight="bold" fill="#388e3c">RULE-CALC-010</text>
  <text x="330" y="455" text-anchor="middle" font-size="9" fill="#333">Date Input</text>
  <text x="330" y="468" text-anchor="middle" font-size="9" fill="#333">Conversion</text>
  
  <!-- Dependency arrow from RULE-CALC-010 to RULE-CALC-007 -->
  <line x1="250" y1="450" x2="230" y2="450" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Transaction List Pagination (Independent) -->
  <rect x="500" y="420" width="180" height="80" rx="10" fill="#fff8e1" stroke="#ffc107" stroke-width="2"/>
  <text x="590" y="445" text-anchor="middle" font-size="12" font-weight="bold" fill="#f57c00">RULE-CALC-009</text>
  <text x="590" y="465" text-anchor="middle" font-size="10" fill="#333">Transaction List</text>
  <text x="590" y="480" text-anchor="middle" font-size="10" fill="#333">Pagination</text>
  
  <!-- Legend -->
  <text x="50" y="620" font-size="16" font-weight="bold" fill="#333">Legend:</text>
  
  <rect x="50" y="640" width="20" height="15" fill="#e8f4fd" stroke="#2196f3" stroke-width="1"/>
  <text x="80" y="652" font-size="12" fill="#333">Bill Payment Rules</text>
  
  <rect x="220" y="640" width="20" height="15" fill="#fff3e0" stroke="#ff9800" stroke-width="1"/>
  <text x="250" y="652" font-size="12" fill="#333">Account Update Rules</text>
  
  <rect x="400" y="640" width="20" height="15" fill="#e8f5e8" stroke="#4caf50" stroke-width="1"/>
  <text x="430" y="652" font-size="12" fill="#333">Report Generation Rules</text>
  
  <rect x="580" y="640" width="20" height="15" fill="#fff8e1" stroke="#ffc107" stroke-width="1"/>
  <text x="610" y="652" font-size="12" fill="#333">Independent Rule</text>
  
  <rect x="50" y="670" width="20" height="15" fill="none" stroke="#9c27b0" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="80" y="682" font-size="12" fill="#333">Functional Grouping</text>
  
  <line x1="220" y1="677" x2="240" y2="677" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="250" y="682" font-size="12" fill="#333">Rule Dependency</text>
  
  <!-- Summary Box -->
  <rect x="50" y="720" width="900" height="60" rx="5" fill="#f5f5f5" stroke="#ccc" stroke-width="1"/>
  <text x="70" y="740" font-size="12" font-weight="bold" fill="#333">Summary:</text>
  <text x="70" y="755" font-size="11" fill="#333">• 10 Business Calculation Rules identified across 4 COBOL programs</text>
  <text x="70" y="770" font-size="11" fill="#333">• Primary focus: Account management, bill payment processing, and transaction reporting</text>
</svg>
